services:
  - type: web
    name: revbusters-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --timeout 120
    envVars:
      - key: APIFY_API_TOKEN
        sync: false   # Set manually in Render dashboard → Environment
      - key: ANTHROPIC_API_KEY
        sync: false   # Set manually in Render dashboard → Environment
